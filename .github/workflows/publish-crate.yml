name: Publish to crates.io
run-name: Publish ${{ inputs.version }} to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v0.1.0 or v0.1.0-alpha.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Version must match vX.Y.Z or vX.Y.Z-suffix format (got: $VERSION)"
            exit 1
          fi

      - name: Verify release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ inputs.version }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::No GitHub release found for ${{ inputs.version }}"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$CARGO_VERSION" != "${{ inputs.version }}" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag (${{ inputs.version }})"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
